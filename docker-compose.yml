version: '3.9'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server

    ports:
    - "3000:3000"
    env_file:
    - ./server/.env
  
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client

    ports:
    - "5000:5000"
    env_file:
    - ./client/.env